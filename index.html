<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice-as-a-Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --panel: #111820;
            --border: rgba(0, 220, 180, 0.15);
            --glow: #00dcb4;
            --glow-dim: rgba(0, 220, 180, 0.4);
            --amber: #f5a623;
            --amber-dim: rgba(245, 166, 35, 0.3);
            --red: #ff4560;
            --text: #c8d8e8;
            --text-dim: #5a7a8a;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Orbitron', sans-serif;
            --body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 220, 180, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 220, 180, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo-tag {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--glow);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        h1 {
            font-family: var(--display);
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 40px var(--glow-dim);
        }

        h1 span { color: var(--glow); }

        .header-meta {
            text-align: right;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            line-height: 2.2;
        }

        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--glow);
            box-shadow: 0 0 8px var(--glow);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .main-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--glow), transparent);
            opacity: 0.5;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
        }

        .panel-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--glow);
        }

        .panel-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .panel-body { padding: 18px; }

        .corner-tl, .corner-br {
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--glow);
            border-style: solid;
            opacity: 0.4;
        }
        .corner-tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .corner-br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

        textarea {
            width: 100%;
            height: 220px;
            background: #05080b;
            color: #a8d8c0;
            border: 1px solid rgba(0, 220, 180, 0.1);
            border-radius: 3px;
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.7;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
            caret-color: var(--glow);
        }

        textarea:focus {
            border-color: var(--glow-dim);
            box-shadow: 0 0 0 1px var(--glow-dim), inset 0 0 20px rgba(0, 220, 180, 0.03);
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .run-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            font-family: var(--display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--glow);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }

        .run-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .run-btn:hover::before { transform: translateX(100%); }
        .run-btn:hover {
            box-shadow: 0 0 30px var(--glow-dim), 0 0 60px rgba(0, 220, 180, 0.15);
            transform: translateY(-1px);
        }
        .run-btn:active { transform: translateY(0); }
        .run-btn.loading { background: var(--amber); pointer-events: none; }

        .btn-secondary {
            padding: 14px 24px;
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--glow-dim);
            color: var(--glow);
        }

        .status-bar {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .output-area {
            background: #020407;
            min-height: 240px;
            max-height: 480px;
            overflow-y: auto;
            padding: 20px;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.8;
            white-space: pre;
        }

        .output-area::-webkit-scrollbar { width: 6px; }
        .output-area::-webkit-scrollbar-track { background: transparent; }
        .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .output-ready { color: #00ff88; }
        .output-error { color: var(--red); }
        .output-warn  { color: var(--amber); }
        .output-placeholder { color: var(--text-dim); opacity: 0.5; }

        /* Structured output styles */
        .result-section {
            margin-bottom: 22px;
        }
        .result-section-title {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--glow);
            border-bottom: 1px solid rgba(0,220,180,0.15);
            padding-bottom: 6px;
            margin-bottom: 12px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
        }
        .result-table th {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            text-align: left;
            padding: 5px 12px 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .result-table td {
            font-family: var(--mono);
            font-size: 13px;
            padding: 7px 12px 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }
        .result-table tr:last-child td { border-bottom: none; }
        .td-name { color: #7ec8e3; }
        .td-value { color: #00ff88; font-weight: bold; }
        .td-unit  { color: var(--text-dim); font-size: 11px; }
        .td-desc  { color: var(--text-dim); font-size: 11px; }
        .summary-tag {
            display: inline-block;
            background: rgba(0,220,180,0.08);
            border: 1px solid rgba(0,220,180,0.2);
            border-radius: 2px;
            font-family: var(--mono);
            font-size: 11px;
            padding: 2px 8px;
            margin: 3px 4px 3px 0;
            color: var(--glow);
        }
        .summary-tag.warn { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.2); color: var(--amber); }
        .summary-tag.err  { background: rgba(255,69,96,0.08);  border-color: rgba(255,69,96,0.2);  color: var(--red); }
        .raw-toggle {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(0,220,180,0.1);
        }
        .raw-toggle-btn {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 2px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 2px;
            text-transform: uppercase;
        }
        .raw-toggle-btn:hover { color: var(--glow); border-color: var(--glow-dim); }
        .raw-output {
            display: none;
            margin-top: 12px;
            background: #020407;
            border: 1px solid rgba(0,220,180,0.07);
            padding: 12px 14px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            white-space: pre-wrap;
            max-height: 220px;
            overflow-y: auto;
            border-radius: 2px;
        }
        .op-region { color: #ffcc55; }
        .analysis-info {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
        .cursor { animation: blink 1s step-end infinite; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        header { animation: fadeUp 0.4s ease both; }
        .panel-netlist { animation: fadeUp 0.4s 0.1s ease both; }
        .controls-row { animation: fadeUp 0.4s 0.2s ease both; }
        .panel-output { animation: fadeUp 0.4s 0.3s ease both; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo-area">
                <div class="logo-tag">// CIRCUIT SIMULATION ENGINE v2.1</div>
                <h1>SPICE<span>-AS-A-</span>SERVICE</h1>
            </div>
            <div class="header-meta">
                <div><span class="status-dot"></span>NGSPICE READY</div>
                <div>ENDPOINT&nbsp;&nbsp;127.0.0.1:8000</div>
                <div>PROTOCOL&nbsp;HTTP / REST</div>
            </div>
        </header>

        <div class="main-grid">

            <div class="panel panel-netlist">
                <div class="corner-tl"></div>
                <div class="corner-br"></div>
                <div class="panel-header">
                    <span class="panel-title">▶ NETLIST INPUT</span>
                    <span class="panel-badge">SPICE 3F5 COMPATIBLE</span>
                </div>
                <div class="panel-body">
                    <textarea id="netlistInput" spellcheck="false">NMOS DC Bias Test
Vdd d 0 5V
Vgs g 0 2V
M1 d g 0 0 my_nmos
.model my_nmos NMOS (VTO=1.0 KP=0.02)
.op
.print dc v(d) v(g) i(Vdd)
.end</textarea>
                </div>
            </div>

            <div class="controls-row">
                <button class="run-btn" id="runBtn" onclick="runSimulation()">
                    <svg width="16" height="16" viewBox="0 0 16 16" style="fill:currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>
                    <span id="btnLabel">RUN SIMULATION</span>
                </button>
                <button class="btn-secondary" onclick="clearAll()">CLEAR</button>
                <button class="btn-secondary" onclick="loadExample()">LOAD EXAMPLE</button>
                <div class="status-bar" id="statusBar">READY</div>
            </div>

            <div class="panel panel-output">
                <div class="corner-tl"></div>
                <div class="corner-br"></div>
                <div class="panel-header">
                    <span class="panel-title">▶ NGSPICE OUTPUT</span>
                    <span class="panel-badge" id="outputBadge">AWAITING INPUT</span>
                </div>
                <div class="output-area" id="outputArea"><span class="output-placeholder">── Simulation results will appear here <span class="cursor">█</span></span></div>
            </div>

        </div>
    </div>

    <script>
        async function runSimulation() {
            const netlist = document.getElementById('netlistInput').value.trim();
            const outputArea = document.getElementById('outputArea');
            const runBtn = document.getElementById('runBtn');
            const btnLabel = document.getElementById('btnLabel');
            const statusBar = document.getElementById('statusBar');
            const outputBadge = document.getElementById('outputBadge');

            if (!netlist) {
                outputArea.innerHTML = '<span class="output-error">⚠ ERROR: No netlist provided.</span>';
                return;
            }

            runBtn.classList.add('loading');
            btnLabel.innerHTML = '<span class="spinner"></span> SIMULATING...';
            statusBar.textContent = 'RUNNING...';
            outputBadge.textContent = 'PROCESSING';
            const t0 = performance.now();

            outputArea.innerHTML = '<span class="output-warn">⟳ Dispatching netlist to ngspice engine...</span>';

            try {
                const response = await fetch('https://final-spice-as-a-service.onrender.com/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ netlist })
                });

                const data = await response.json();
                const elapsed = ((performance.now() - t0) / 1000).toFixed(3);

                if (response.ok) {
                    outputArea.innerHTML = parseAndRender(data.output, elapsed);
                    statusBar.textContent = `DONE IN ${elapsed}s`;
                    outputBadge.textContent = `SUCCESS · ${elapsed}s`;
                } else {
                    outputArea.innerHTML = `<span class="output-error">✖ ERROR ${response.status}\n${esc(data.detail)}</span>`;
                    statusBar.textContent = 'FAILED';
                    outputBadge.textContent = 'ERROR';
                }
            } catch (err) {
                outputArea.innerHTML = `<span class="output-error">✖ CONNECTION REFUSED\n\nCould not reach the simulation server.\nMake sure the backend is running.</span>`;
                statusBar.textContent = 'NO CONNECTION';
                outputBadge.textContent = 'OFFLINE';
            } finally {
                runBtn.classList.remove('loading');
                btnLabel.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" style="fill:currentColor"><path d="M3 2l11 6-11 6V2z"/></svg> RUN SIMULATION';
            }
        }

        // ─── Smart Output Parser ──────────────────────────────────────────
        function parseAndRender(raw, elapsed) {
            const lines = raw.split('\n');
            const sections = [];
            const warnings = [];
            const errors = [];

            // Detect analysis types present
            const hasOP  = /operating point/i.test(raw);
            const hasDC  = /dc transfer/i.test(raw) || /dc sweep/i.test(raw);
            const hasAC  = /ac analysis/i.test(raw);
            const hasTRAN= /transient/i.test(raw);

            // ── Collect warnings and errors ──
            lines.forEach(l => {
                if (/^\s*warning/i.test(l) && l.trim().length > 8)  warnings.push(l.trim());
                if (/^\s*error/i.test(l)   && l.trim().length > 5)  errors.push(l.trim());
            });

            // ── Parse Operating Point (.op) ──
            const opRows = [];
            let inOP = false;
            for (let i = 0; i < lines.length; i++) {
                const l = lines[i];
                if (/operating point/i.test(l)) { inOP = true; continue; }
                if (inOP) {
                    // Node voltages: "v(node) = value"
                    const vMatch = l.match(/^\s*(v\(\S+\))\s*=\s*([\d.eE+\-]+)/i);
                    if (vMatch) { opRows.push({ name: vMatch[1], value: formatVal(vMatch[2]), unit: 'V', desc: 'Node Voltage' }); continue; }
                    // Currents: "i(component) = value"
                    const iMatch = l.match(/^\s*(i[dsgb]?\(\S+\))\s*=\s*([\d.eE+\-]+)/i);
                    if (iMatch) { opRows.push({ name: iMatch[1], value: formatVal(iMatch[2]), unit: 'A', desc: 'Branch Current' }); continue; }
                    // MOSFET/BJT model params block (id, vgs, vth etc)
                    const mosMatch = l.match(/^\s*(id|vgs|vds|vth|vdsat|vbs|vbe|vce|ic|ib|ie|gm|gds|cbd|cbs|cgs|cgd|cgb)\s*=\s*([\d.eE+\-]+)/i);
                    if (mosMatch) {
                        const paramUnits = { id:'A', ic:'A', ib:'A', ie:'A', gm:'S', gds:'S', vgs:'V', vds:'V', vth:'V', vdsat:'V', vbs:'V', vbe:'V', vce:'V', cbd:'F', cbs:'F', cgs:'F', cgd:'F', cgb:'F' };
                        const pname = mosMatch[1].toLowerCase();
                        opRows.push({ name: mosMatch[1].toUpperCase(), value: formatVal(mosMatch[2]), unit: paramUnits[pname]||'', desc: paramDescription(pname) });
                        continue;
                    }
                    if (/^-{5,}/.test(l) && opRows.length > 0) break;
                }
            }

            // ── Parse .print / tabular output ──
            const printRows = [];
            let headerLine = null, colNames = [];
            for (let i = 0; i < lines.length; i++) {
                const l = lines[i];
                // Detect header row (contains column names like v(out), vp(out), freq, time...)
                if (!headerLine && /^\s*(index|freq|time|v\(|vp\(|vm\(|i\(|vdb\()/i.test(l)) {
                    headerLine = l;
                    colNames = l.trim().split(/\s{2,}|\t+/).map(s => s.trim()).filter(Boolean);
                    continue;
                }
                if (headerLine && /^\s*[\d.eE+\-]/.test(l)) {
                    const vals = l.trim().split(/\s+/);
                    if (vals.length >= 2) {
                        printRows.push(vals);
                    }
                }
                // Stop if blank line after data
                if (headerLine && printRows.length > 0 && /^\s*$/.test(l)) break;
            }

            // ── Parse DC transfer curve summary ──
            const dcSummary = [];
            for (let i = 0; i < lines.length; i++) {
                const m = lines[i].match(/^\s*(v\(\S+\)|i\(\S+\))\s*=\s*([\d.eE+\-]+)/i);
                if (m && !inOP) dcSummary.push({ name: m[1], value: formatVal(m[2]) });
            }

            // ── BUILD HTML ──
            let html = '';

            // Errors first
            if (errors.length) {
                html += `<div class="result-section">
                    <div class="result-section-title">⚠ Errors</div>
                    ${errors.map(e => `<div style="color:var(--red);font-family:var(--mono);font-size:12px;margin-bottom:4px;">✖ ${esc(e)}</div>`).join('')}
                </div>`;
            }

            // Warnings
            if (warnings.length) {
                html += `<div class="result-section">
                    <div class="result-section-title">⚡ Warnings</div>
                    ${warnings.map(w => `<div style="color:var(--amber);font-family:var(--mono);font-size:12px;margin-bottom:4px;">△ ${esc(w)}</div>`).join('')}
                </div>`;
            }

            // Operating Point Results
            if (opRows.length) {
                html += `<div class="result-section">
                    <div class="result-section-title">◉ DC Operating Point</div>
                    <table class="result-table">
                        <thead><tr>
                            <th>Parameter</th><th>Value</th><th>Unit</th><th>Description</th>
                        </tr></thead>
                        <tbody>
                            ${opRows.map(r => `<tr>
                                <td class="td-name">${esc(r.name)}</td>
                                <td class="td-value">${esc(r.value)}</td>
                                <td class="td-unit">${esc(r.unit)}</td>
                                <td class="td-desc">${esc(r.desc)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            }

            // .print tabular results
            if (printRows.length && colNames.length) {
                const analysisLabel = hasAC ? 'AC Sweep Results' : hasTRAN ? 'Transient Analysis' : 'DC Sweep Results';
                const maxRows = 30;
                const displayRows = printRows.slice(0, maxRows);
                html += `<div class="result-section">
                    <div class="result-section-title">📊 ${analysisLabel}</div>
                    <div class="analysis-info">${printRows.length} data points${printRows.length > maxRows ? ` · showing first ${maxRows}` : ''}</div>
                    <table class="result-table">
                        <thead><tr>${colNames.map(c => `<th>${esc(c)}</th>`).join('')}</tr></thead>
                        <tbody>
                            ${displayRows.map(row =>
                                `<tr>${row.map((v,i) => `<td class="${i===0?'td-name':'td-value'}">${formatSci(v)}</td>`).join('')}</tr>`
                            ).join('')}
                        </tbody>
                    </table>
                    ${printRows.length > maxRows ? `<div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;margin-top:8px;">... ${printRows.length - maxRows} more rows in raw output</div>` : ''}
                </div>`;
            }

            // Summary tags
            const tags = [];
            if (hasOP)   tags.push('<span class="summary-tag">OP POINT</span>');
            if (hasDC)   tags.push('<span class="summary-tag">DC SWEEP</span>');
            if (hasAC)   tags.push('<span class="summary-tag">AC ANALYSIS</span>');
            if (hasTRAN) tags.push('<span class="summary-tag">TRANSIENT</span>');
            tags.push(`<span class="summary-tag">${elapsed}s</span>`);
            if (warnings.length) tags.push(`<span class="summary-tag warn">⚡ ${warnings.length} WARNING${warnings.length>1?'S':''}</span>`);
            if (errors.length)   tags.push(`<span class="summary-tag err">✖ ${errors.length} ERROR${errors.length>1?'S':''}</span>`);

            if (!opRows.length && !printRows.length && !errors.length) {
                // Fallback: nothing structured found, show cleaned raw
                html += `<div class="result-section">
                    <div class="result-section-title">Output</div>
                    <div style="font-family:var(--mono);font-size:12px;color:#a8d8c0;white-space:pre-wrap;">${cleanRaw(raw)}</div>
                </div>`;
            }

            // Raw output collapsible
            html += `<div class="raw-toggle">
                <div style="margin-bottom:8px;">${tags.join('')}</div>
                <button class="raw-toggle-btn" onclick="toggleRaw(this)">▶ SHOW RAW OUTPUT</button>
                <div class="raw-output">${esc(raw)}</div>
            </div>`;

            return html;
        }

        function toggleRaw(btn) {
            const raw = btn.nextElementSibling;
            const visible = raw.style.display === 'block';
            raw.style.display = visible ? 'none' : 'block';
            btn.textContent = visible ? '▶ SHOW RAW OUTPUT' : '▼ HIDE RAW OUTPUT';
        }

        // Format a numeric value with engineering notation
        function formatVal(s) {
            const n = parseFloat(s);
            if (isNaN(n)) return s;
            const abs = Math.abs(n);
            if (abs === 0) return '0';
            if (abs >= 1e9)  return (n/1e9).toPrecision(4)  + ' G';
            if (abs >= 1e6)  return (n/1e6).toPrecision(4)  + ' M';
            if (abs >= 1e3)  return (n/1e3).toPrecision(4)  + ' k';
            if (abs >= 1)    return n.toPrecision(5);
            if (abs >= 1e-3) return (n*1e3).toPrecision(4)  + ' m';
            if (abs >= 1e-6) return (n*1e6).toPrecision(4)  + ' μ';
            if (abs >= 1e-9) return (n*1e9).toPrecision(4)  + ' n';
            if (abs >= 1e-12)return (n*1e12).toPrecision(4) + ' p';
            return n.toExponential(3);
        }

        function formatSci(s) {
            const n = parseFloat(s);
            if (isNaN(n)) return esc(s);
            return formatVal(s);
        }

        function paramDescription(p) {
            const map = {
                id:'Drain Current', ic:'Collector Current', ib:'Base Current', ie:'Emitter Current',
                vgs:'Gate-Source Voltage', vds:'Drain-Source Voltage', vth:'Threshold Voltage',
                vdsat:'Saturation Voltage', vbs:'Bulk-Source Voltage',
                vbe:'Base-Emitter Voltage', vce:'Collector-Emitter Voltage',
                gm:'Transconductance', gds:'Output Conductance',
                cbd:'Drain-Bulk Cap', cbs:'Source-Bulk Cap',
                cgs:'Gate-Source Cap', cgd:'Gate-Drain Cap', cgb:'Gate-Bulk Cap'
            };
            return map[p.toLowerCase()] || '';
        }

        // Strip ngspice boilerplate lines
        function cleanRaw(raw) {
            return raw.split('\n')
                .filter(l => !/^(ngspice|note:|circuit:|date:|temperature:|^\s*$|^-{5,}|tnom|copyright|license|please|for further)/i.test(l))
                .join('\n').trim();
        }

        function clearAll() {
            document.getElementById('netlistInput').value = '';
            document.getElementById('outputArea').innerHTML = '<span class="output-placeholder">── Cleared. Enter a netlist and run. <span class="cursor">█</span></span>';
            document.getElementById('statusBar').textContent = 'READY';
            document.getElementById('outputBadge').textContent = 'AWAITING INPUT';
        }

        function loadExample() {
            document.getElementById('netlistInput').value = `RC Low-Pass Filter AC Sweep
Vin in 0 AC 1V
R1 in out 1k
C1 out 0 1u
.ac dec 100 1 100k
.print ac v(out) vp(out)
.end`;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
    </script>
</body>
</html>
